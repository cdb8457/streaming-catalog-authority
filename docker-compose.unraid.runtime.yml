# Launcher/runtime Unraid stack for Catalog Authority.
#
# Use this file when a launcher such as Arcane cannot use the repository directory as a Docker
# build context. It defaults to the locally built repo-ops:latest image and can be pointed at a
# published image with CATALOG_AUTHORITY_OPS_IMAGE.
#
# Runtime steady state:
#   postgres stays running
#   app is the long-running read-only operator API/UI on port 8099
#   ops is a one-shot command container and exits after the command completes
#
# Defaults are the canonical Unraid release paths. Phase 155 fresh-deploy smoke may override
# CATALOG_AUTHORITY_APPDATA_DIR and OPERATOR_UI_HOST_PORT to avoid touching existing deployments.

name: catalogauthority

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - ${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/pgdata:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

  ops:
    image: ${CATALOG_AUTHORITY_OPS_IMAGE:-repo-ops:latest}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      ADMIN_DATABASE_URL_FILE: /run/secrets/admin_database_url
      DATABASE_URL_FILE: /run/secrets/database_url
      CUSTODIAN_MODE: file
      COMPLETION_SECRET_FILE: /run/secrets/completion_secret
      CUSTODIAN_KEYSTORE_DIR: /var/lib/catalog/keystore
      CUSTODIAN_KEK_FILE: /run/secrets/custodian_kek
      OPERATOR_UI_TOKEN_FILE: ${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/secrets/operator_ui_token
    volumes:
      - ${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/keystore:/var/lib/catalog/keystore
      - ${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/backups:/backups
      - ${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/backups:${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/backups
      - ${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/secrets/operator_ui_token:${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/secrets/operator_ui_token
    secrets:
      - admin_database_url
      - database_url
      - completion_secret
      - custodian_kek
    entrypoint: ["npm", "run"]
    command: ["ops:migrate"]

  sidecar:
    image: ${CATALOG_AUTHORITY_OPS_IMAGE:-repo-ops:latest}
    restart: unless-stopped
    environment:
      APP_ENV: production
      SIDECAR_SOCKET_PATH: /run/catalog-sidecar/catalog-sidecar.sock
      SIDECAR_STATE_DIR: /var/lib/catalog-sidecar/state
      SIDECAR_COMPLETION_SECRET_FILE: /run/secrets/completion_secret
      SIDECAR_KEK_FILE: /run/secrets/custodian_kek
      NPM_CONFIG_CACHE: /tmp/npm-cache
    volumes:
      - ${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/sidecar/run:/run/catalog-sidecar
      - ${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/sidecar/state:/var/lib/catalog-sidecar/state
    secrets:
      - completion_secret
      - custodian_kek
    entrypoint: ["npm", "run"]
    command: ["ops:sidecar-daemon", "--", "--serve"]
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/catalog-sidecar/catalog-sidecar.sock"]
      interval: 10s
      timeout: 5s
      retries: 6
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m

  app:
    image: ${CATALOG_AUTHORITY_OPS_IMAGE:-repo-ops:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      ADMIN_DATABASE_URL_FILE: /run/secrets/admin_database_url
      DATABASE_URL_FILE: /run/secrets/database_url
      CUSTODIAN_MODE: file
      COMPLETION_SECRET_FILE: /run/secrets/completion_secret
      CUSTODIAN_KEYSTORE_DIR: /var/lib/catalog/keystore
      CUSTODIAN_KEK_FILE: /run/secrets/custodian_kek
      OPERATOR_UI_TOKEN_FILE: /run/secrets/operator_ui_token
    volumes:
      - ${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/keystore:/var/lib/catalog/keystore
    secrets:
      - admin_database_url
      - database_url
      - completion_secret
      - custodian_kek
      - operator_ui_token
    entrypoint: ["npm", "run"]
    command: ["ops:operator-ui-server", "--", "--serve", "--host", "0.0.0.0", "--port", "8099"]
    ports:
      - "${OPERATOR_UI_HOST_PORT:-8099}:8099"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:8099/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6

secrets:
  postgres_password:
    file: ${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/secrets/postgres_password
  admin_database_url:
    file: ${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/secrets/admin_database_url
  database_url:
    file: ${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/secrets/database_url
  completion_secret:
    file: ${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/secrets/completion_secret
  custodian_kek:
    file: ${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/secrets/custodian_kek
  operator_ui_token:
    file: ${CATALOG_AUTHORITY_APPDATA_DIR:-/mnt/user/appdata/catalog}/secrets/operator_ui_token
