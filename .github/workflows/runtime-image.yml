# Catalog Authority — production operator UI image and consumer release bundle.
#
# The daemon-backed work lives here because it cannot live anywhere else: the machines this project is
# developed on do not all run a Docker daemon, and a smoke test that silently skips is not a smoke test.
# Linux with Docker is the environment where "the image works" is a fact rather than a hope.
#
# PUBLISHING IS NOT PART OF CI. Building, smoke-testing and assembling run on every push and pull request;
# pushing an image and attaching a release asset run only for a published GitHub release or a deliberate
# manual dispatch from a version tag. Which of those is true is decided ONCE, by a tested pure function
# (src/ops/release-ref.ts) rather than by interpolating `github.ref_name` — that context means a branch on
# one event and a tag on another, and a release that publishes a different tag from the one GitHub announced
# is worse than a release that fails.

name: Runtime image and release bundle

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the runtime image and release asset. Only valid from a vX.Y.Z tag.
        type: boolean
        default: false
  release:
    types: [published]

# Read-only by default. The one job that publishes asks for more, explicitly, and nothing else can.
permissions:
  contents: read

concurrency:
  group: runtime-image-${{ github.ref }}
  cancel-in-progress: true

env:
  # The only architecture this project can actually verify: it is what the CI runner is, so it is what the
  # smoke test runs on. See docs/PHASE_245_CONSUMER_RELEASE_IMAGE.md.
  PUBLISH_PLATFORMS: linux/amd64

jobs:
  suites:
    name: Typecheck and Phase 242-245 suites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - name: Phase 251, 250, 249, 248, 247, 246, 245, 245 release delivery, 244, 243, 242
        run: |
          npm run test:phase251-local
          npm run test:phase250-local
          npm run test:phase249-local
          npm run test:phase248-local
          npm run test:phase247-local
          npm run test:phase246-local
          npm run test:phase245-local
          npm run test:release-delivery
          npm run test:phase244-local
          npm run test:phase243-local
          npm run test:phase242-local
      - name: Operator UI authentication and boundary suites
        run: |
          npm run test:operator-ui-service
          npm run test:operator-ui-local-auth-boundary
          npm run test:operator-ui-auth-access-contract
          npm run test:operator-ui-render-allowlist
      - name: Release guard and versioned release cut
        run: |
          npm run test:release-guard
          npm run test:versioned-release-cut
      - name: Compose files still resolve
        run: |
          docker compose -f docker-compose.runtime.yml config --quiet
          docker compose -f docker-compose.runtime.yml -f docker-compose.runtime.build.yml config --quiet
      - name: The release coordinates are this repository's
        # Constants cannot notice they have gone stale. A run can: this fails if the checked-in owner is not
        # the owner actually executing the workflow, which is exactly the defect that shipped a publish
        # target in a namespace this repository does not own.
        run: npm run ops:release-coordinates -- --repository "${{ github.repository }}"

  image:
    name: Build and smoke the production image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build, contract-check, up, probe, down
        run: bash deploy/ci/runtime-image-smoke.sh
      - name: Container logs on failure
        if: failure()
        run: docker compose -f docker-compose.runtime.yml -f docker-compose.runtime.build.yml logs --tail 200

  release-candidate:
    name: Release-candidate acceptance (real browser, real Compose)
    # Phase 248. This is the check no file-reading or fake-DOM test can make: assemble the EXACT consumer
    # release artifact, extract it into a fresh directory with no source and no Node dependency, run a
    # locally-built production image through the EXTRACTED Compose stack, and drive a REAL headless Chromium
    # against it. It ACCEPTS a release candidate; it never publishes one — no registry login, no push, no
    # tag, no release asset. Permissions are inherited read-only (no `permissions:` block here), so this job
    # is structurally incapable of publishing.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install the pinned browser acceptance harness
        # A self-contained, pinned test toolchain kept OUT of the repository's own package.json, so the
        # production dependency closure stays exactly pg + tsx. Chromium is pinned by the @playwright/test
        # version in deploy/ci/acceptance/package-lock.json.
        run: |
          npm --prefix deploy/ci/acceptance ci
          npx --prefix deploy/ci/acceptance playwright install --with-deps chromium
      - name: Assemble, extract, run and drive the release candidate in a real browser
        # REQUIRE_ACCEPTANCE=1 makes a missing daemon or browser a hard failure: CI must not silently skip.
        env:
          REQUIRE_ACCEPTANCE: "1"
        run: bash deploy/ci/release-candidate-acceptance.sh
      - name: Always tear down containers and volumes
        # The orchestrator tears its own stack down on every exit path; this is the belt-and-braces net that
        # runs even if the job step was cancelled or killed before the trap could.
        if: always()
        run: |
          docker ps -aq --filter "label=com.docker.compose.project=catalogauthority-local" | xargs -r docker rm -f
          docker volume ls -q --filter "label=com.docker.compose.project=catalogauthority-local" | xargs -r docker volume rm
          docker image rm -f catalog-authority-ops:rc-acceptance 2>/dev/null || true
      - name: Upload sanitized acceptance diagnostics (failure only)
        # Only on failure, short retention, and only AFTER the orchestrator's redaction gate has removed any
        # token-bearing file and failed the run if it found one. Nothing suspect reaches this step.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rc-acceptance-diagnostics
          path: dist/rc-acceptance-artifacts
          retention-days: 7
          if-no-files-found: ignore

  lifecycle:
    name: Release lifecycle acceptance (fresh, restart, upgrade, rollback)
    # Phase 249. Proves the DOCUMENTED lifecycle an ordinary self-hosted operator lives through: fresh
    # setup/start, authenticated health+version, persisted secrets and Postgres state, read-only record
    # visibility, graceful restart, upgrade from a locally-built prior-version fixture to the candidate, and
    # rollback to that prior fixture — without losing secrets, data or artifacts. It runs in an ISOLATED
    # Compose project (its own name, volumes, host port and directories) using only local-only image tags.
    # It ACCEPTS; it never publishes — no registry login, no push, no tag, no asset. No `permissions:` block,
    # so it inherits the workflow's read-only default and is structurally incapable of publishing.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Assemble, extract, and run the documented lifecycle against a real Compose stack
        # REQUIRE_ACCEPTANCE=1 makes a missing daemon a hard failure: CI must not silently skip.
        env:
          REQUIRE_ACCEPTANCE: "1"
        run: bash deploy/ci/release-lifecycle-acceptance.sh
      - name: Always tear down the isolated lifecycle project and its images
        # The orchestrator tears its own isolated stack down on every exit path; this is the belt-and-braces
        # net, scoped to THIS project and THESE tags, that runs even if the step was cancelled or killed. It
        # can never touch an unrelated Docker resource.
        if: always()
        run: |
          docker ps -aq --filter "label=com.docker.compose.project=catalogauthority-lifecycle" | xargs -r docker rm -f
          docker volume ls -q --filter "label=com.docker.compose.project=catalogauthority-lifecycle" | xargs -r docker volume rm
          docker network ls -q --filter "label=com.docker.compose.project=catalogauthority-lifecycle" | xargs -r docker network rm 2>/dev/null || true
          docker image rm -f catalog-authority-ops:lifecycle-prior catalog-authority-ops:lifecycle-candidate 2>/dev/null || true
      - name: Upload sanitized lifecycle diagnostics (failure only)
        # Only on failure, short retention, and only AFTER the orchestrator's redaction gate has promoted
        # nothing suspect. Nothing reaches this step that did not pass redaction.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rc-lifecycle-diagnostics
          path: dist/rc-lifecycle-artifacts
          retention-days: 7
          if-no-files-found: ignore

  bundle:
    name: Assemble and validate the release bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Assemble, archive and check
        run: bash deploy/ci/release-bundle-check.sh dist/release-bundle dist/release-archive
      # For inspecting a CI run. This is NOT the consumer download — it expires, it needs a GitHub login and
      # a trip through the Actions UI, and it wraps the archive in another zip. The download users are told
      # about is the release asset attached by the publish job.
      - name: Keep the bundle for CI inspection (not the consumer download)
        uses: actions/upload-artifact@v4
        with:
          name: ci-inspection-release-bundle
          path: dist/release-bundle
          retention-days: 14

  publish:
    name: Publish the release image and asset
    # Every gate must be green before a byte is published, INCLUDING both real-Compose acceptances: the
    # release-candidate browser run (Phase 248) AND the lifecycle run (Phase 249) that proves upgrade and
    # rollback preserve data. Neither `release-candidate` nor `lifecycle` carries an `if:`, so both run on
    # every event that can reach publish (a release, or a deliberate dispatch) and are never conditionally
    # skipped; a needed job that failed or was cancelled is not "success", so publish is skipped — a release
    # cannot go out over a failed or cancelled acceptance.
    needs: [suites, image, bundle, release-candidate, lifecycle]
    # A cheap pre-filter only. The real gate is the release-ref step below, which is a tested function and
    # refuses anything this expression might let through.
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    environment: release
    permissions:
      # contents: write ONLY here, and only so the archive can be attached to the release that triggered it.
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Decide whether this run may publish, and as exactly what
        id: release
        env:
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_DRAFT: ${{ github.event.release.draft }}
          RELEASE_PUBLISH_INPUT: ${{ inputs.publish }}
        run: npm run ops:release-ref
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push the pinned tag
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runtime
          platforms: ${{ env.PUBLISH_PLATFORMS }}
          push: true
          # Exactly one immutable tag, resolved by the gate above. No `latest`, no branch tag, no alias.
          tags: ${{ steps.release.outputs.image_ref }}
          build-args: |
            IMAGE_VERSION=${{ steps.release.outputs.tag }}
            IMAGE_REVISION=${{ github.sha }}
          provenance: true
          sbom: true
      - name: Assemble and validate the release asset, pinned to the published digest
        run: bash deploy/ci/release-bundle-check.sh dist/release-bundle dist/release-archive
        env:
          RELEASE_IMAGE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
          RELEASE_IMAGE_REPOSITORY: ${{ steps.release.outputs.image_repository }}
      - name: Attach the archive and its checksum to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          ARCHIVE: ${{ steps.release.outputs.archive }}
        run: bash deploy/ci/release-asset-upload.sh dist/release-archive
