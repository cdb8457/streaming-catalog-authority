# Phase 3 Stage 3.4 — deployment topology (CLI/ops pattern; NOT a long-running HTTP app).
#
# Run ops on demand (one-shot containers), e.g.:
#   docker compose -f docker-compose.deploy.yml run --rm ops ops:migrate
#   docker compose -f docker-compose.deploy.yml run --rm ops ops:backup -- dump /backups/cat.json
#   docker compose -f docker-compose.deploy.yml run --rm ops ops:backup -- restore /backups/cat.json
#
# Secrets are delivered as FILES and consumed via the Stage 3.1/3.2 `*_FILE` config indirection,
# so no secret values live in the compose file or environment. The custodian keystore lives on a
# SEPARATE volume from the Postgres data (and from backups), so a DB backup never contains key
# material. See docs/PHASE_3_DEPLOYMENT.md (incl. Unraid notes + operator-owned age wrapping).

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot ops/CLI container. No ports, no daemon — invoked via `docker compose run`.
  ops:
    build: .
    restart: "no"   # one-shot: never auto-restart (run on demand via `docker compose run`)
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMIN_DATABASE_URL_FILE: /run/secrets/admin_database_url
      DATABASE_URL_FILE: /run/secrets/database_url
      CUSTODIAN_MODE: file
      COMPLETION_SECRET_FILE: /run/secrets/completion_secret
      CUSTODIAN_KEYSTORE_DIR: /var/lib/catalog/keystore
      CUSTODIAN_KEK_FILE: /run/secrets/custodian_kek
    volumes:
      - keystore:/var/lib/catalog/keystore   # SEPARATE from pgdata and from backups
      - backups:/backups
    secrets:
      - admin_database_url
      - database_url
      - completion_secret
      - custodian_kek
    entrypoint: ["npm", "run"]
    command: ["ops:migrate"]                 # default one-shot; override per `docker compose run`

volumes:
  pgdata:
  keystore:
  backups:

# Operator-provided files under ./secrets/ (gitignored). The KEK file should be the DECRYPTED
# 32-byte KEK (base64) — operator-owned age wrapping happens BEFORE it is mounted here.
secrets:
  postgres_password:
    file: ./secrets/postgres_password
  admin_database_url:
    file: ./secrets/admin_database_url
  database_url:
    file: ./secrets/database_url
  completion_secret:
    file: ./secrets/completion_secret
  custodian_kek:
    file: ./secrets/custodian_kek
