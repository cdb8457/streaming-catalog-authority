# Canonical Unraid stack for Catalog Authority.
#
# This is the single-file Unraid deployment entrypoint. It intentionally merges the generic deploy
# topology with the Unraid appdata bind mounts so operators do not need multiple compose files.
#
# Run ops on demand:
#   docker compose -f docker-compose.unraid.yml run --rm ops ops:doctor -- --json
#   docker compose -f docker-compose.unraid.yml run --rm ops ops:backup -- dump /backups/cat.json
#   docker compose -f docker-compose.unraid.yml run --rm ops ops:rewrap-kek -- --plan --json
#
# Start the read-only operator API/UI:
#   docker compose -f docker-compose.unraid.yml up -d postgres app

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - /mnt/user/appdata/catalog/pgdata:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot ops/CLI container. No ports, no daemon; invoked via `docker compose run`.
  ops:
    build: .
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      ADMIN_DATABASE_URL_FILE: /run/secrets/admin_database_url
      DATABASE_URL_FILE: /run/secrets/database_url
      CUSTODIAN_MODE: file
      COMPLETION_SECRET_FILE: /run/secrets/completion_secret
      CUSTODIAN_KEYSTORE_DIR: /var/lib/catalog/keystore
      CUSTODIAN_KEK_FILE: /run/secrets/custodian_kek
    volumes:
      - /mnt/user/appdata/catalog/keystore:/var/lib/catalog/keystore
      - /mnt/user/appdata/catalog/backups:/backups
    secrets:
      - admin_database_url
      - database_url
      - completion_secret
      - custodian_kek
    entrypoint: ["npm", "run"]
    command: ["ops:migrate"]

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      ADMIN_DATABASE_URL_FILE: /run/secrets/admin_database_url
      DATABASE_URL_FILE: /run/secrets/database_url
      CUSTODIAN_MODE: file
      COMPLETION_SECRET_FILE: /run/secrets/completion_secret
      CUSTODIAN_KEYSTORE_DIR: /var/lib/catalog/keystore
      CUSTODIAN_KEK_FILE: /run/secrets/custodian_kek
      OPERATOR_UI_TOKEN_FILE: /run/secrets/operator_ui_token
    volumes:
      - /mnt/user/appdata/catalog/keystore:/var/lib/catalog/keystore
    secrets:
      - admin_database_url
      - database_url
      - completion_secret
      - custodian_kek
      - operator_ui_token
    entrypoint: ["npm", "run"]
    command: ["ops:operator-ui-server", "--", "--serve", "--host", "0.0.0.0", "--port", "8099"]
    ports:
      - "8099:8099"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:8099/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6

secrets:
  postgres_password:
    file: /mnt/user/appdata/catalog/secrets/postgres_password
  admin_database_url:
    file: /mnt/user/appdata/catalog/secrets/admin_database_url
  database_url:
    file: /mnt/user/appdata/catalog/secrets/database_url
  completion_secret:
    file: /mnt/user/appdata/catalog/secrets/completion_secret
  custodian_kek:
    file: /mnt/user/appdata/catalog/secrets/custodian_kek
  operator_ui_token:
    file: /mnt/user/appdata/catalog/secrets/operator_ui_token
