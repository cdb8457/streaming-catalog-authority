services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Run the suite against the postgres service instead of embedded PG:
  #   docker compose run --rm app
  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMIN_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/catalog
      DATABASE_URL: postgresql://app:app@postgres:5432/catalog
    command: ["npm", "run", "ci"]

volumes:
  pgdata:
